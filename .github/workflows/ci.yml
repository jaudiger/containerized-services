name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            docker:
              - '**/docker-compose.yml'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  lint-docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-docker.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  lint-actions:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: jaudiger/reusable-workflows/.github/workflows/static-analysis-github-actions.yml@4aef3115afe05a19785b3e14970ecd4f400cc457

  ci:
    if: always()
    needs: [lint-docker, lint-actions]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULTS: ${{ toJson(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            echo "One or more required checks failed"
            exit 1
          fi
